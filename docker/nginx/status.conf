# Nginx status configuration for Datadog monitoring

server {
    listen 8080;
    server_name localhost;
    
    # Status endpoint for Datadog
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
    
    # Additional metrics endpoint
    location /nginx_metrics {
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
