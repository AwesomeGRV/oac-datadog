init_config:

instances:
  - host: "{{ DD_POSTGRES_HOST | default('localhost') }}"
    port: "{{ DD_POSTGRES_PORT | default('5432') }}"
    username: "{{ DD_POSTGRES_USER | default('grv_user') }}"
    password: "{{ DD_POSTGRES_PASSWORD }}"
    dbname: "{{ DD_POSTGRES_DB | default('grv_prod') }}"
    ssl: false
    tags:
      - "service:{{ DD_SERVICE | default('grv-api') }}"
      - "env:{{ DD_ENV | default('prod') }}"
      - "team:backend"
      - "owner:grv-team"
    
    # Custom metrics collection
    collect_database_size_metrics: true
    collect_activity_metrics: true
    collect_count_metrics: true
    collect_default_db: true
    
    # Performance monitoring
    collect_function_metrics: true
    collect_index_usage_metrics: true
    collect_statement_level_metrics: true
    
    # Connection monitoring
    max_connections: 100
    connection_timeout: 10
    
    # Query monitoring
    query_timeout: 30
    query_samples: 10
    
    # Custom queries for grv-api specific metrics
    custom_queries:
      - metric_prefix: grv.postgres
        query: |
          SELECT 
            count(*) as active_connections,
            count(*) FILTER (WHERE state = 'active') as active_queries,
            count(*) FILTER (WHERE state = 'idle') as idle_connections
          FROM pg_stat_activity 
          WHERE datname = current_database();
        columns:
          - name: active_connections
            type: gauge
          - name: active_queries
            type: gauge
          - name: idle_connections
            type: gauge
        tags:
          - "database:{{ DD_POSTGRES_DB | default('grv_prod') }}"
      
      - metric_prefix: grv.postgres
        query: |
          SELECT 
            schemaname,
            tablename,
            seq_scan,
            seq_tup_read,
            idx_scan,
            idx_tup_fetch
          FROM pg_stat_user_tables
          LIMIT 20;
        columns:
          - name: seq_scan
            type: gauge
          - name: seq_tup_read
            type: gauge
          - name: idx_scan
            type: gauge
          - name: idx_tup_fetch
            type: gauge
        tags:
          - "schema:{{ .schemaname }}"
          - "table:{{ .tablename }}"
